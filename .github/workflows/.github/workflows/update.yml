name: Update levels.json

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Crear levels.json
        run: |
          curl -L "https://pointercrate.com/api/v2/demons/listed/" -o pointercrate.json

          python3 << 'EOF'
          import json

          with open("pointercrate.json", "r") as f:
              data = json.load(f)

          levels = []

          for demon in data.get("data", []):
              if "level_id" in demon:
                  levels.append({
                      "id": demon["level_id"]
                  })

          with open("levels.json", "w") as f:
              json.dump(levels, f, indent=4)

          print("Levels creados:", len(levels))
          EOF

      - name: Guardar cambios
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add levels.json
          git commit -m "Update levels.json" || exit 0
          git push
